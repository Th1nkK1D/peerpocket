pre-commit:
  commands:
    check:
      run: bun run biome check --write --unsafe --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      stage_fixed: true
pre-push:
  commands:
    test:
      run: bun run test
commit-msg:
  commands:
    check:
      run: bunx commitlint --edit $1
      stage_fixed: true
